services:
  - type: web
    name: landscout-agent
    runtime: python
    plan: free
    buildCommand: |
      python -m pip install --upgrade pip
      python -m pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_NAME
        value: LandScout Agent（地脉智能体）
      - key: USER_AGENT
        value: landscout-agent/0.1 (+public-source-research)
      - key: REQUEST_TIMEOUT_SECONDS
        value: "25"
      - key: LANDSCOUT_MEMORY_SAFE_MODE
        value: "true"
      - key: LANDSCOUT_DISABLE_PLAYWRIGHT
        value: "true"
      - key: LANDSCOUT_LIVE_SOURCE_LIMIT_CAP
        value: "12"
      - key: LANDSCOUT_LIVE_SOURCE_BATCH_SIZE
        value: "3"
      - key: LANDSCOUT_MAX_RAW_DOCUMENTS
        value: "42"
      - key: LANDSCOUT_MAX_RESPONSE_BYTES
        value: "8000000"
      - key: LANDSCOUT_MAX_WEB_RESPONSE_BYTES
        value: "3000000"
      - key: LANDSCOUT_MAX_ATTACHMENT_RESPONSE_BYTES
        value: "8000000"
      - key: LANDSCOUT_MAX_DOCUMENT_CHARS
        value: "20000"
      - key: LANDSCOUT_MAX_EXTRACTION_DOCUMENTS
        value: "18"
      - key: LANDSCOUT_MAX_PDF_PAGES
        value: "8"
      - key: LANDSCOUT_MAX_EXCEL_SHEETS
        value: "8"
      - key: LANDSCOUT_MAX_EXCEL_ROWS_PER_SHEET
        value: "300"
