services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: landscout_agent
      POSTGRES_USER: gov
      POSTGRES_PASSWORD: gov
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gov -d landscout_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
